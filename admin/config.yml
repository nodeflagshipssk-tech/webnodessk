backend:
  name: git-gateway
  branch: main

media_folder: "assets/photos"
public_folder: "assets/photos"

locale: "th"

collections:
  - name: "site_data"
    label: "ข้อมูลเว็บไซต์"
    files:

      - name: "calendar"
        label: "📅 ปฏิทินงาน"
        file: "_data/calendar.json"
        fields:
          - name: events
            label: รายการกิจกรรม
            label_singular: กิจกรรม
            widget: list
            fields:
              - label: วัน (ตัวเลข)
                name: date
                widget: string
                hint: "เช่น 30"
              - label: เดือน
                name: month
                widget: string
                hint: "เช่น มี.ค. หรือ เม.ย."
              - label: ประเด็น
                name: type
                widget: select
                options:
                  - { label: "🚗 ความปลอดภัยทางถนน", value: road }
                  - { label: "🌿 ลดการดื่มแอลกอฮอล์", value: alc }
                  - { label: "📋 โครงการ / รายงาน", value: blue }
              - label: หัวข้อกิจกรรม
                name: title
                widget: string
              - label: รายละเอียด (พี่เลี้ยง / สถานที่)
                name: detail
                widget: string
                required: false

      - name: "team_road"
        label: "🚗 พี่เลี้ยงประเด็นการจัดการความปลอดภัยทางถนน"
        file: "_data/team-road.json"
        fields:
          - name: members
            label: รายชื่อพี่เลี้ยง
            label_singular: พี่เลี้ยง
            widget: list
            fields:
              - { label: ชื่อ-นามสกุล, name: name, widget: string }
              - { label: ตำแหน่ง/บทบาท, name: role, widget: string }
              - { label: หน่วยงานสังกัด, name: org, widget: string, required: false }

      - name: "team_alc"
        label: "🌿 พี่เลี้ยงประเด็นการลดการบริโภคเครื่องดื่มแอลกอฮอล์"
        file: "_data/team-alc.json"
        fields:
          - name: members
            label: รายชื่อพี่เลี้ยง
            label_singular: พี่เลี้ยง
            widget: list
            fields:
              - { label: ชื่อ-นามสกุล, name: name, widget: string }
              - { label: ตำแหน่ง/บทบาท, name: role, widget: string }
              - { label: หน่วยงานสังกัด, name: org, widget: string, required: false }

      - name: "projects"
        label: "📋 สถานะโครงการย่อย 27 โครงการ"
        file: "_data/projects.json"
        fields:
          - name: projects
            label: รายการโครงการ
            label_singular: โครงการ
            widget: list
            fields:
              - { label: "รหัสโครงการ", name: code, widget: string }
              - { label: "ชื่อโครงการ", name: title, widget: string }
              - label: ประเด็น
                name: type
                widget: select
                options:
                  - { label: ความปลอดภัยทางถนน, value: road }
                  - { label: ลดการดื่มแอลกอฮอล์, value: alc }
              - { label: "พื้นที่ดำเนินการ", name: area, widget: string }
              - { label: "พี่เลี้ยงหลัก", name: mentor, widget: string }
              - label: สถานะโครงการ
                name: status
                widget: select
                options:
                  - { label: "✅ ดำเนินการ", value: "ดำเนินการ" }
                  - { label: "🏁 เสร็จสิ้น", value: "เสร็จสิ้น" }
                  - { label: "⚠️ ล่าช้า", value: "ล่าช้า" }
                  - { label: "⏸ หยุดชะงัก", value: "หยุดชะงัก" }
              - { label: "เลขที่สัญญา", name: contract, widget: string }
              - { label: "ผู้รับทุน", name: grantee, widget: string }

      - name: "highlights"
        label: "⭐ กิจกรรมเด่น (ข้อเรียนรู้จากพื้นที่)"
        file: "_data/highlights.json"
        fields:
          - name: highlights
            label: รายการกิจกรรมเด่น
            label_singular: กิจกรรม
            widget: list
            fields:
              - label: ประเด็น
                name: type
                widget: select
                options:
                  - { label: "🚗 ความปลอดภัยทางถนน", value: road }
                  - { label: "🌿 ลดการดื่มแอลกอฮอล์", value: alc }
                  - { label: "📋 หน่วยจัดการ", value: blue }
              - { label: หัวข้อ, name: title, widget: string }
              - { label: พื้นที่, name: area, widget: string, hint: "เช่น ตำบลน้ำอ้อม อำเภอกันทรลักษ์" }
              - { label: เดือน/ปี, name: date, widget: string, hint: "เช่น มี.ค. 2569" }
              - { label: สรุปข้อเรียนรู้, name: summary, widget: text }
              - label: แท็ก
                name: tags
                widget: list
                field: { label: แท็ก, name: tag, widget: string }
                required: false

      - name: "news"
        label: "📢 ข่าวประชาสัมพันธ์"
        file: "_data/news.json"
        fields:
          - name: news
            label: รายการข่าว
            label_singular: ข่าว
            widget: list
            fields:
              - { label: หัวข้อข่าว, name: title, widget: string }
              - { label: แหล่งที่มา / หน่วยงาน, name: source, widget: string }
              - { label: วันที่, name: date, widget: string, hint: "เช่น 1 มี.ค. 2569" }
              - label: ประเด็น
                name: type
                widget: select
                options:
                  - { label: "🚗 ความปลอดภัยทางถนน", value: road }
                  - { label: "🌿 ลดการดื่มแอลกอฮอล์", value: alc }
                  - { label: "📋 หน่วยจัดการ", value: blue }
              - label: รูปภาพ
                name: image
                widget: image
                required: false
                hint: "อัปโหลดรูปภาพหรือโปสเตอร์ประชาสัมพันธ์"
              - label: "YouTube Video ID (ถ้ามี)"
                name: video
                widget: string
                required: false
                hint: "วาง ID จาก YouTube เท่านั้น เช่น 7NOg7-T-bIA (ส่วนที่อยู่หลัง ?v= ใน URL)"
              - { label: "ลิงก์ภายนอก (ถ้ามี)", name: url, widget: string, required: false, hint: "URL เว็บไซต์หรือ Google Drive — ถ้าใส่ YouTube ให้ใช้ช่อง Video ID แทน" }

      - name: "docs"
        label: "📁 เอกสารและสื่อ"
        file: "_data/docs.json"
        fields:
          - name: docs
            label: รายการเอกสาร
            label_singular: เอกสาร
            widget: list
            fields:
              - { label: ชื่อเอกสาร / หัวข้อ, name: title, widget: string }
              - label: หมวดหมู่
                name: category
                widget: select
                options:
                  - { label: "📘 คู่มือ", value: "คู่มือ" }
                  - { label: "📄 เอกสารโครงการ", value: "เอกสารโครงการ" }
                  - { label: "📝 แบบฟอร์ม", value: "แบบฟอร์ม" }
                  - { label: "📊 รายงาน", value: "รายงาน" }
                  - { label: "🎬 วิดีโอ YouTube", value: "youtube" }
              - label: ประเภทไฟล์
                name: type
                widget: select
                options:
                  - { label: "🔗 Link (Google Drive / เว็บไซต์)", value: "link" }
                  - { label: "📎 อัปโหลดไฟล์ตรง", value: "file" }
                  - { label: "▶️ YouTube", value: "youtube" }
              - label: URL / ลิงก์
                name: url
                widget: string
                required: false
                hint: "สำหรับ Link หรือ YouTube ให้วาง URL ที่นี่ | YouTube ให้วาง embed URL เช่น https://www.youtube.com/embed/xxxxxxx"
              - label: อัปโหลดไฟล์
                name: file
                widget: file
                required: false
                hint: "สำหรับประเภท 'อัปโหลดไฟล์ตรง' เท่านั้น"
              - { label: คำอธิบาย, name: description, widget: string, required: false }
